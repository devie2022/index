<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的幸福时光</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f9f9f9; padding: 20px; }
        
        /* 顶部标题区域 */
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; color: #333; margin-bottom: 10px; }
        .family-names { color: #666; font-size: 1.2rem; letter-spacing: 2px; }

        /* 轮播区域 */
        .banner-container { width: 100%; max-width: 1000px; height: 400px; margin: 0 auto 50px; overflow: hidden; border-radius: 15px; position: relative; }
        .banner-slide { width: 100%; height: 100%; object-fit: cover; animation: fade 20s infinite; }

        /* 照片墙布局 */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .photo-item { border-radius: 10px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .photo-item:hover { transform: scale(1.03); }
        .photo-item img { width: 100%; height: 300px; object-fit: cover; }

        /* 动态效果 */
        @keyframes fade {
            0%, 16% { content: url('banner1.jpg'); }
            17%, 33% { content: url('banner2.jpg'); }
            34%, 50% { content: url('banner3.jpg'); }
            51%, 66% { content: url('banner4.jpg'); }
            67%, 83% { content: url('banner5.jpg'); }
            84%, 100% { content: url('banner6.jpg'); }
        }
    </style>
</head>
<body>

<header>
    <h1>欢乐的家庭</h1>
    <div class="family-names">高金山 & 李林 & 高子函 & 高子瑄</div>
</header>

<div class="banner-container">
    <img src="banner1.jpg" class="banner-slide" alt="banner">
</div>

<div class="photo-grid">
    <div class="photo-item"><img src="photo1.jpg" alt="photo 1"></div>
    <div class="photo-item"><img src="photo2.jpg" alt="photo 2"></div>
    <div class="photo-item"><img src="photo3.jpg" alt="photo 3"></div>
    <div class="photo-item"><img src="photo4.jpg" alt="photo 4"></div>
</div>

</body>
</html>
