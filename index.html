<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的幸福时光</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; padding: 40px 20px; }
        
        /* 顶部标题区域 */
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 3rem; color: #1a1a1a; margin-bottom: 15px; font-weight: 700; }
        .family-names { color: #555; font-size: 1.3rem; letter-spacing: 4px; border-top: 2px solid #333; display: inline-block; padding-top: 10px; }

        /* 优化后的动态轮播区域 */
        .banner-container { width: 100%; max-width: 1100px; height: 550px; margin: 0 auto 60px; overflow: hidden; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); position: relative; }
        .banner-slide { width: 100%; height: 100%; object-fit: cover; animation: fade 24s infinite; }

        /* 优化后的照片墙：采用错落式排版 */
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .photo-item { border-radius: 15px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.1); transition: all 0.4s ease; background: #fff; padding: 10px; }
        .photo-item:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .photo-item img { width: 100%; height: 350px; object-fit: cover; border-radius: 8px; }

        /* 让照片错落有致 */
        .photo-item:nth-child(1) { grid-column: span 2; height: 450px; } 
        .photo-item:nth-child(1) img { height: 100%; }

        /* 动态轮播关键帧 */
        @keyframes fade {
            0%, 16% { content: url('banner1.jpg'); }
            17%, 33% { content: url('banner2.jpg'); }
            34%, 50% { content: url('banner3.jpg'); }
            51%, 66% { content: url('banner4.jpg'); }
            67%, 83% { content: url('banner5.jpg'); }
            84%, 100% { content: url('banner6.jpg'); }
        }
    </style>
</head>
<body>

<header>
    <h1>欢乐的家庭</h1>
    <div class="family-names">高金山 & 李林 & 高子函 & 高子瑄</div>
</header>

<div class="banner-container">
    <img src="banner1.jpg" class="banner-slide" alt="banner">
</div>

<div class="photo-grid">
    <div class="photo-item"><img src="photo1.jpg" alt="photo 1"></div>
    <div class="photo-item"><img src="photo2.jpg" alt="photo 2"></div>
    <div class="photo-item"><img src="photo3.jpg" alt="photo 3"></div>
    <div class="photo-item"><img src="photo4.jpg" alt="photo 4"></div>
</div>

</body>
</html>
